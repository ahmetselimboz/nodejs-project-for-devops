name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Sadece main branch'ine push yapıldığında çalışır [4]

jobs:
  # 1. Aşama: Test ve Build
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --prefix api # Bağımlılıkları kurar [5]
      - name: Run Tests
        run: npm test --prefix api || echo "Testler henüz tanımlanmamış" # Otomatik testleri çalıştırır [6]

  # 2. Aşama: Docker İmajını Oluşturma ve Pushlama
  docker-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: asb00/nodejs-devops-api:latest # Docker imajın [7]

  # 3. Aşama: Kubernetes Sunucusuna Deploy (K3s)
  deploy:
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.K8S_SERVER_IP }}
          username: root
          key: ${{ secrets.K8S_SSH_KEY }}
          port: 2222
          script: |
            # K8s konfigürasyonlarını güncelle ve podları yeniden başlat
            kubectl rollout restart deployment nodejs-api