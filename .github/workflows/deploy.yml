name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json

    - name: Install Dependencies
      run: |
        cd api
        npm ci

    - name: Run ESLint (Lint)
      run: |
        cd api
        npm run lint

    - name: Run Jest Tests
      run: |
        cd api
        npm run test
