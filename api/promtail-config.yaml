server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nodejs-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-logs
          __path__: /var/log/api-logs/*.log

  - job_name: kubernetes-pods
    static_configs:
      - targets:
          - localhost
        labels:
          job: kubernetes-logs
          __path__: /var/log/pods/**/*.log