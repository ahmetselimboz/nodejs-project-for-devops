events { worker_connections 1024; }

http {
    # Performans ve Güvenlik Ayarları
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Nginx versiyonunu gizler (Güvenlik)

    server {
        listen 80 default_server;
        server_name 45.138.25.195;

        # Güvenlik: Metrik uç noktasına dışarıdan erişimi engelle
        location /metrics {
            deny all;
            return 403;
        }

        # Node.js API Yönlendirmesi
        location / {
            proxy_pass http://api:3000; # localhost yerine servis ismi
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Grafana Yönlendirmesi
        location /grafana/ {
            proxy_pass http://grafana:3000; # Konteynere iç porttan (3000) ulaşır
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Prometheus Yönlendirmesi
        location /prometheus/ {
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}   