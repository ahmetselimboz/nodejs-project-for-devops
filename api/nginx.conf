events { worker_connections 1024; }

http {
    # Performans ve Güvenlik Ayarları
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Nginx versiyonunu gizler (Güvenlik)

    # WebSocket upgrade için Connection başlığını dinamik ayarlar
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Docker iç DNS çözücüsü. proxy_pass'lerde değişken kullanıldığı için
    # nginx adresleri başlangıçta sabitlemez, her istekte yeniden çözer.
    # Böylece konteynerler yeniden oluşturulup IP değiştirse bile 502 olmaz.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80 default_server;
        server_name 45.138.25.195;

        # Güvenlik: Metrik uç noktasına dışarıdan erişimi engelle
        location /metrics {
            deny all;
            return 403;
        }

        # Node.js API Yönlendirmesi
        location / {
            set $api_upstream http://api:3000; # localhost yerine servis ismi
            proxy_pass $api_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Grafana Yönlendirmesi
        location /grafana/ {
            set $grafana_upstream http://grafana:3000; # Konteynere iç porttan (3000) ulaşır
            proxy_pass $grafana_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;       # Grafana Live (WebSocket) için
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus Yönlendirmesi
        location /prometheus/ {
            set $prometheus_upstream http://prometheus:9090;
            proxy_pass $prometheus_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Mongo Express Yönlendirmesi
        location /mongo-express/ {
            set $mongoexpress_upstream http://mongo-express:8081;
            proxy_pass $mongoexpress_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}   