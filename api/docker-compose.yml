services:
  # Nginx servisini container seviyesinde devre dışı bırakıyoruz (YOL A: Host Nginx kullanılacak)
  # nginx:
  #   image: nginx:alpine
  #   container_name: reverse-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #     - grafana
  #     - prometheus
  #     - mongo-express
  #   restart: unless-stopped

  api:
    image: asb00/nodejs-devops-api:latest # Docker Hub veya yerelde build edilen imaj
    container_name: nodejs-devops-api
    # Portu sadece host localhost'una (127.0.0.1) bağlıyoruz ki dışarıdan direkt erişilemesin
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./logs:/app/logs
    environment:
      # Container ağında Mongo'ya servis adıyla erişilir
      DB_HOST: mongo
      DB_PORT: 27017
      DB_NAME: test
      PORT: 3000
      LOG_LEVEL: debug
      DEFAULT_LANGUAGE: EN
      NODE_ENV: production
      GRAFANA_ADMIN_PASSWORD: Ahmet+401292
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    container_name: nodejs-devops-mongo
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "127.0.0.1:8081:8081" # Sadece host localhost'una açıyoruz
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH_USERNAME=selim_admin
      - ME_CONFIG_BASICAUTH_PASSWORD=Ahmet+401292
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_SITE_BASEURL=/mongo-express/
    depends_on:
      - mongo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=https://api.selimboz.com/prometheus/'
    ports:
      - "127.0.0.1:9090:9090" # Sadece host localhost'una açıyoruz
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=mail.selimboz.com:465
      - GF_SMTP_USER=ahmetselimboz@selimboz.com
      - GF_SMTP_PASSWORD=Ahmet+401292
      - GF_SMTP_SKIP_VERIFY=true
      - GF_SMTP_FROM_ADDRESS=ahmetselimboz@selimboz.com
      - GF_SMTP_FROM_NAME=Grafana-Alerts
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://api.selimboz.com/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000" # API portu (3000) ile çakışmaması için hostta 3001'e eşliyoruz
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  loki:
    image: grafana/loki:latest
    container_name: loki
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./logs:/var/log/api-logs
      - ./promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:
